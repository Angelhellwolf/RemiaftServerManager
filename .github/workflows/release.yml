name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: remiaft-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: remiaft-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: remiaft-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/remiaft ${{ matrix.artifact }}
      - name: Package Windows
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\remiaft.exe ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
